name: CI/CD Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run the workflow manually from the Actions tab

env:
  IMAGE_NAME: "kopilnagi/react-demo-docker"
  # GITHUB_RUN_NUMBER acts exactly like Jenkins' ${BUILD_NUMBER}
  IMAGE_TAG: ${{ github.run_number }} 

jobs:
  build-and-deploy:
    # 'ubuntu-latest' comes with Docker, git, curl, and a clean workspace out of the box
    runs-on: ubuntu-latest 

    steps:
      # Stage: Cleanup Workspace & Checkout
      # GitHub Actions automatically starts with a clean workspace when using actions/checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Stage: Test Docker
      - name: Test Docker
        run: docker ps

      # Stage: Debug
      - name: Debug
        run: |
          pwd
          ls -la

      # Stage: Build Docker Image
      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG -f react-demo/Dockerfile react-demo

      # Stage: Install & Run Trivy
      # Using the official Aquasecurity Trivy action is cleaner, but this keeps your exact logic
      - name: Install & Run Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b .
          ./trivy image $IMAGE_NAME:$IMAGE_TAG

      # Stage: Push Image
      - name: Log in to Docker Hub and Push Image
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
          docker push $IMAGE_NAME:$IMAGE_TAG

      # Stage: Deploy
      # Note: 'ubuntu-latest' runs on GitHub-hosted runners. 
      # If you want to deploy to your own local server, see the architectural note below.
      - name: Deploy
        run: |
          docker stop react-app || true
          docker rm react-app || true
          docker run -d --name react-app -p 80:80 $IMAGE_NAME:$IMAGE_TAG
